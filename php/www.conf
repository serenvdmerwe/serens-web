[global]
error_log = /proc/self/fd/2
daemonize = no

[www]
; Logging
php_admin_flag[log_errors] = on
access.log = /proc/self/fd/1
slowlog = /proc/self/fd/2
catch_workers_output = yes

; Socket — placeholders awese are substituted by the skill at scaffold time
listen = 0.0.0.0:9000
listen.backlog = 128
listen.owner = awese
listen.group = awese
listen.mode = 0660

; Process Management — local dev sizing
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Health endpoints
pm.status_path = /php-fpm-status
ping.path = /php-fpm-ping
ping.response = pong

; Request monitoring
request_slowlog_timeout = 30s
request_terminate_timeout = 300s

; Security
security.limit_extensions = .php
clear_env = no
