; Project-specific PHP settings. Loaded from $PHP_INI_DIR/conf.d/ on top of
; the production php.ini base.

[PHP]
max_input_vars = 9000
max_multipart_body_parts = 9000
default_socket_timeout = 30

memory_limit = 512M
upload_max_filesize = 256M
post_max_size = 256M
max_execution_time = 300
max_input_time = 300

; Error handling — local dev, log errors but never display
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /proc/self/fd/2

expose_php = 0
cgi.fix_pathinfo = 0
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; Sessions
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax

[APCu]
apc.enabled = 1
apc.shm_size = 128M
apc.enable_cli = 0

[OPcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.file_cache = "/var/www/.opcache"
